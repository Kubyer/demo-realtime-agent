app = "voiceagent-frontend"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    NEXT_PUBLIC_BACKEND_URL = "https://voiceagent-rtd.fly.dev"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
